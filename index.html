<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자기소개 페이지</title>
    <!-- 폰트 적용 -->
    <link href="https://fonts.googleapis.com/css2?family=Gugi&family=Hi+Melody&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: aliceblue; /* 전체 배경색 */
            color: #1c2c5b;
            font-family: "Gugi", sans-serif; /* 기본 폰트 */
            text-align: center;
            padding: 20px;
        }

        h2 { 
            color: #6CABDD; 
            font-family: "Hi Melody", cursive;
            font-size: 3rem;
        }

        h3 { 
            color: #555; 
            font-family: "Hi Melody", cursive;
            font-size: 2rem;
        }

        .main-img {
            width: 25%;
            display: block;
            margin: 20px auto;
            border-radius: 20px;
        }

        .hobby-section {
            background-color: white;
            border: 2px solid #6CABDD;
            padding: 20px;
            margin: 30px auto;
            max-width: 500px;
            border-radius: 15px;
            transition: 0.3s; /* 마우스 올릴 때 부드러운 효과 */
        }
        
        .hobby-section:hover { background-color: #f0f8ff; } /* 마우스 올리면 색 변화 */
    </style>
</head>
<body>
    <h2>AI/AX수강생 안정근의 자기소개서</h2>
    <h3>친하게 지내요~~!</h3>

    <a href="images/caricature.png" target="_blank">
        <img src="images/caricature.png" alt="제 캐리커처입니다" class="main-img"> 
    </a>

    <div class="hobby-section">
        <!-- 오타 수정: hoddy -> hobby -->
        <a href="hoddy.html" style="text-decoration: none; color: inherit;">
            <h3>⚽ 나의 취미 (클릭해서 보기)</h3>
        </a>
    </div>
</body>
</html>
